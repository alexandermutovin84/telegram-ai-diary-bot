services:
  postgres:
    image: postgres:16-alpine
    container_name: diary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diary
      POSTGRES_PASSWORD: diary
      POSTGRES_DB: diary
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U diary -d diary']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
